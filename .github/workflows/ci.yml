# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Build & test

on:
  pull_request:
  push:
    branches: [ main, release/* ]

permissions:
  contents: read

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDKs
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          # JDK 8 runs the Gradle daemon and is the :library toolchain; JDK 25 is the :benchmarks
          # toolchain. 8 is listed last so JAVA_HOME points at it — the daemon must NOT run on JDK 25
          # (Gradle 8.14.5's Kotlin DSL compiler cannot parse a "25.x" daemon version).
          java-version: |
            25
            8
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0 # zizmor: ignore[cache-poisoning]

      - name: Build with Gradle
        # Build + test the library, build + test the benchmark generator, and compile the JMH benchmark
        # sources via jmhJar — catching benchmark compilation regressions WITHOUT running any benchmark.
        # fromEnv exposes the setup-java JDKs to Gradle's toolchain resolution.
        run: ./gradlew build :benchmarks:jmhJar -Porg.gradle.java.installations.fromEnv=JAVA_HOME_8_X64,JAVA_HOME_25_X64

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Test Results Linux
          path: '**/test-results/**/*.xml'
