# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Build & test

on:
  pull_request:
  push:
    branches: [ main, release/* ]

permissions:
  contents: read

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDKs
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          # JDK 25 runs the Gradle daemon and is the :benchmarks toolchain; JDK 8 is the :library
          # toolchain. 25 is listed last so JAVA_HOME (the daemon JVM) points at it.
          java-version: |
            8
            25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0 # zizmor: ignore[cache-poisoning]

      - name: Build with Gradle
        # Build + test the library, build + test the benchmark generator, and compile the JMH benchmark
        # sources via jmhJar — catching benchmark compilation regressions WITHOUT running any benchmark.
        # fromEnv exposes the JDK 8 toolchain (JDK 25 is JAVA_HOME and resolved automatically).
        run: ./gradlew build :benchmarks:jmhJar -Porg.gradle.java.installations.fromEnv=JAVA_HOME_8_X64

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Test Results Linux
          path: '**/test-results/**/*.xml'
